services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: checkout_db
      POSTGRES_USER: checkout_user
      POSTGRES_PASSWORD: checkout_pass
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U checkout_user -d checkout_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: